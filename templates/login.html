<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БЕРКУТ — Авторизація</title>
    <!-- Подключаем Bootstrap 5 и Иконки напрямую -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    
    <style>
        /* Глубокий темный тактический фон */
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Карточка терминала */
        .terminal-card {
            background-color: #121216;
            border: 1px solid #2d2d35;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        /* Ярко-белые лейблы */
        .form-label {
            color: #ffffff !important;
            font-weight: 600;
            font-size: 0.8rem;
            text-uppercase: true;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Чисто черные поля ввода */
        .form-control {
            background-color: #000000 !important;
            border: 1px solid #3d3d45 !important;
            color: #ffffff !important;
            padding: 0.6rem 0.75rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #ff4a4a !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 74, 74, 0.2) !important;
        }

        /* Контейнер иконок слева от инпута */
        .input-group-text {
            background-color: #1a1a22 !important;
            border: 1px solid #3d3d45 !important;
            color: #ff4a4a !important; /* Делаем иконки сразу контрастными и агрессивными */
        }

        .input-group:focus-within .input-group-text {
            border-color: #ff4a4a !important;
        }

        /* Кнопка входа */
        .btn-berkut {
            background-color: #dc3545;
            border: none;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-berkut:hover {
            background-color: #bd2130;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.4);
        }

        /* Кастомный стиль всплывающих уведомлений Flask (Flash) */
        .alert-flash {
            background-color: #221315;
            border: 1px solid #dc3545;
            color: #ff8080;
            font-size: 0.85rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="terminal-card">
        
        <!-- Заголовок системы -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle mb-3" style="width: 60px; height: 60px; border: 1px solid rgba(220,53,69,0.2);">
                <i class="bi bi-eye-fill fs-3"></i>
            </div>
            <h4 class="fw-bold mb-1 text-uppercase" style="letter-spacing: 1px;">БЕРКУТ</h4>
        </div>

        <!-- Вывод ошибок Flask (неверный пароль, брутфорс и т.д.) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-flash p-2 mb-3 text-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Форма авторизации -->
        <form method="POST">
            
            <!-- Логин -->
            <div class="mb-3">
                <label class="form-label text-uppercase">Логін</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Введіть ідентифікатор" required autocomplete="off">
                </div>
            </div>
            
            <!-- Пароль -->
            <div class="mb-4">
                <label class="form-label text-uppercase">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            
            <!-- Войти -->
            <button type="submit" class="btn btn-berkut w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-box-arrow-in-right fs-5"></i> Вхід
            </button>
            
        </form>


    </div>
</div>

</body>
</html>
